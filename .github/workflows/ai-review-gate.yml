name: AI Review Gate

# Enforces the AI-code adversarial review protocol (conductor track 0004, DoD-7).
# On PR open, creates a `pending` status check for `ai-reviewed`.
# The orchestrator pushes `success` via `gh api` after the review subagent passes.
# Branch protection requires this check before merge (when available).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  statuses: write
  contents: read

jobs:
  pending-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Create pending ai-reviewed status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          curl --fail --show-error --retry 2 -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/statuses/$PR_HEAD_SHA" \
            -d '{"state":"pending","context":"ai-reviewed","description":"AI-code adversarial review pending","target_url":"https://github.com/Ryan-AI-Studios/ledgerful-frontend/blob/main/docs/AI-CODE-REVIEW-PROTOCOL.md"}'