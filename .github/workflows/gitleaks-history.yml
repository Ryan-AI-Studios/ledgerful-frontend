name: Gitleaks History Scan

# One-time full-history secret scan (DoD-3). Trigger manually via the Actions UI.
# Can also be re-run periodically to re-baseline after history changes.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  history-scan:
    name: security/gitleaks-history
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository with full history
        # actions/checkout v7.0.0 -> 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      # We run the standalone gitleaks binary (MIT-licensed) instead of
      # gitleaks/gitleaks-action@v2, which carries a commercial EULA and may
      # require a paid GITLEAKS_LICENSE secret on private repositories.
      # Pin the binary by digest for reproducibility and immutability.
      - name: Run gitleaks over full git history
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f git \
            --verbose \
            --redact \
            --config /repo/.github/gitleaks.toml \
            /repo