name: Bundle Secret Scan (Manual)

# Manual full-bundle secret scan. The PR/push gate lives in ci.yml
# (bundle-scan job) so pull requests are blocked on bundle leakage.
# This workflow remains for on-demand or scheduled deep scans.

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  bundle-scan:
    name: security/bundle-scan-manual
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 -> 11bd71901bbe5b1630ceea73d27597364c9af683
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        # actions/setup-node v6.4.0 -> 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Scan built bundle with gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1 detect \
            --source .next/ \
            --config .github/gitleaks.toml \
            --no-git \
            --verbose \
            --redact

      - name: Report clean
        if: success()
        run: echo "No secrets detected in the built bundle."