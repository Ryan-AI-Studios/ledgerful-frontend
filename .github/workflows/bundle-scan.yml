name: Bundle Secret Scan (Manual)

# Manual full-bundle secret scan. The PR/push gate lives in ci.yml
# (bundle-scan job) so pull requests are blocked on bundle leakage.
# This workflow remains for on-demand or scheduled deep scans.

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  bundle-scan:
    name: security/bundle-scan-manual
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout v7.0.0 -> 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # actions/setup-node v6.4.0 -> 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      # We run the standalone gitleaks binary (MIT-licensed) instead of
      # gitleaks/gitleaks-action@v2, which carries a commercial EULA and may
      # require a paid GITLEAKS_LICENSE secret on private repositories.
      # Pin the binary by digest for reproducibility and immutability.
      - name: Scan built bundle with gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f detect \
            --source .next/ \
            --config .github/gitleaks.toml \
            --no-git \
            --verbose \
            --redact

      - name: Report clean
        if: success()
        run: echo "No secrets detected in the built bundle."