name: Bundle Secret Scan

# Scan the built Next.js bundle for secrets that may have leaked into the
# browser. Reuses the gitleaks config from Track 0004. Runs on every CI build.

permissions:
  contents: read

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  bundle-scan:
    name: security/bundle-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 -> 11bd71901bbe5b1630ceea73d27597364c9af683
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        # actions/setup-node v6.4.0 -> 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Scan built bundle with gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1 detect \
            --source .next/ \
            --config .github/gitleaks.toml \
            --no-git \
            --verbose \
            --redact

      - name: Report clean
        if: success()
        run: echo "No secrets detected in the built bundle."
