name: Security

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for the whole workflow.
permissions:
  contents: read

jobs:
  npm-audit:
    name: security/npm-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 -> 11bd71901bbe5b1630ceea73d27597364c9af683
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        # actions/setup-node v6.4.0 -> 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm

      # npm ci fails automatically if package-lock.json is out of sync,
      # so this step also serves as the lockfile-integrity check.
      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  gitleaks:
    name: security/gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      # We run the standalone gitleaks binary (MIT-licensed) instead of
      # gitleaks/gitleaks-action@v2, which carries a commercial EULA and may
      # require a paid GITLEAKS_LICENSE secret on private repositories.
      # Pin the binary by digest for reproducibility and immutability.
      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f git \
            --verbose \
            --redact \
            --config /repo/.github/gitleaks.toml \
            ${{ github.event_name == 'pull_request' && format('--log-opts={0}...{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || '' }} \
            /repo

  semgrep:
    name: security/semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Semgrep
        # NOTE: CodeQL is unavailable on private repos without GHAS. Semgrep is
        # used as the SAST floor. SAST is necessary-but-not-sufficient for an
        # AI-generated codebase; findings must be triaged manually.
        # The deprecated returntocorp/semgrep-action has been replaced with a
        # direct run of the official semgrep/semgrep image pinned by digest.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e SEMGREP_SEND_METRICS=off \
            semgrep/semgrep:1.168.0@sha256:59fbed6127ea7c5dde3ba6a85142733bb20ea9aaa36120c953904f1539aaf66e \
            semgrep scan \
            --config p/typescript \
            --config p/react \
            --config p/owasp-top-ten \
            --metrics=off \
            .
