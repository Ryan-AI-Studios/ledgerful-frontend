name: Security

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for the whole workflow.
permissions:
  contents: read

jobs:
  npm-audit:
    name: security/npm-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 -> 11bd71901bbe5b1630ceea73d27597364c9af683
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        # actions/setup-node v6.4.0 -> 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm

      # npm ci fails automatically if package-lock.json is out of sync,
      # so this step also serves as the lockfile-integrity check.
      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  gitleaks:
    name: security/gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      # We run the standalone gitleaks binary (MIT-licensed) instead of
      # gitleaks/gitleaks-action@v2, which carries a commercial EULA and may
      # require a paid GITLEAKS_LICENSE secret on private repositories.
      # Pin the binary to a specific release tag so scans are reproducible.
      # TODO: pin by digest for immutability (requires `docker pull` + `docker inspect`).
      # Tag pin is reproducible but not immutable.
      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1 git \
            --verbose \
            --redact \
            --config /repo/.github/gitleaks.toml \
            ${{ github.event_name == 'pull_request' && format('--log-opts={0}...{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || '' }} \
            /repo

  semgrep:
    name: security/semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Semgrep
        # returntocorp/semgrep-action v1 -> 713efdd345f3035192eaa63f56867b88e63e4e5d
        # NOTE: CodeQL is unavailable on private repos without GHAS. This legacy
        # Semgrep OSS action is used as the SAST floor. SAST is necessary-but-not-
        # sufficient for an AI-generated codebase; findings must be triaged manually.
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        env:
          SEMGREP_SEND_METRICS: off
        with:
          config: >-
            p/typescript
            p/react
            p/owasp-top-ten
