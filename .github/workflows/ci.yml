name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check API contract is up-to-date and no hand-declared wire interfaces remain
        run: npm run contract:check

  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        # actions/checkout v7.0.0 -> 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        # actions/setup-node v6.4.0 -> 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload build output for bundle scan
        # actions/upload-artifact v7.0.1 -> 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: next-bundle
          path: .next/
          retention-days: 1
          include-hidden-files: true

  telemetry-ingest:
    name: telemetry-ingest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.1.4

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pin check (versioned imports + deno.lock present)
        run: npm run check:telemetry-ingest-pins

      - name: Deno lock integrity (frozen)
        run: deno cache --frozen --lock=supabase/functions/telemetry-ingest/deno.lock supabase/functions/telemetry-ingest/index.ts

      - name: Telemetry ingest unit tests (fail-closed matrix)
        run: npm run test:telemetry-ingest

  bundle-scan:
    name: security/bundle-scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout v7.0.0 -> 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download build output
        # actions/download-artifact v8.0.1 -> 3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: next-bundle
          path: .next/

      # We run the standalone gitleaks binary (MIT-licensed) instead of
      # gitleaks/gitleaks-action@v2, which carries a commercial EULA and may
      # require a paid GITLEAKS_LICENSE secret on private repositories.
      # Pin the binary by digest for reproducibility and immutability.
      - name: Scan built bundle with gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f detect \
            --source .next/ \
            --config .github/gitleaks.toml \
            --no-git \
            --verbose \
            --redact

      - name: Report clean
        if: success()
        run: echo "No secrets detected in the built bundle."
