name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 -> 11bd71901bbe5b1630ceea73d27597364c9af683
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        # actions/setup-node v6.4.0 -> 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build Next.js app
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload build output for bundle scan
        uses: actions/upload-artifact@b4b15b8c7c6ac0ea8f9af1a7254c7c7f4c30c1ae
        with:
          name: next-bundle
          path: .next/
          retention-days: 1

  bundle-scan:
    name: security/bundle-scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 -> 11bd71901bbe5b1630ceea73d27597364c9af683
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download build output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: next-bundle
          path: .next/

      - name: Scan built bundle with gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1 detect \
            --source .next/ \
            --config .github/gitleaks.toml \
            --no-git \
            --verbose \
            --redact

      - name: Report clean
        if: success()
        run: echo "No secrets detected in the built bundle."
