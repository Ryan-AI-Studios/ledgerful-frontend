title = "Ledgerful Frontend Gitleaks Config"

[extend]
useDefault = true

# v8.25.0+ uses [[allowlists]] (array of tables) instead of [allowlist].
# Global allowlists have higher precedence than rule-specific allowlists.
[[allowlists]]
description = "ignore .ledgerful state directory (runtime state, not source)"
paths = [
  '''\.ledgerful\/''',
]

[[allowlists]]
description = ".env.example placeholder values only — do NOT allowlist the whole file"
# Target the extracted Secret value (default regexTarget is "secret").
regexes = [
  '''YOUR_[A-Z_]+_HERE''',
  '''your-project\.supabase\.co''',
]
paths = [
  '''\.env\.example$''',
]

[[allowlists]]
description = "Next.js preview-mode keys are auto-generated build artifacts (inert under output: export)"
paths = [
  '''\.next\/prerender-manifest\.json''',
  '''\.next\/cache/\.previewinfo''',
  '''\.next\/cache/\.rscinfo''',
  '''\.next\/server/server-reference-manifest\.json''',
]

# Track 0077: intentionally public bar-raising telemetry token (open CLI binary;
# not a secret). Documented in coordination.md §6.1 + phase0-memo. Real controls
# are fail-closed global quotas + spend caps.
[[allowlists]]
description = "0077 public bar-raising telemetry ingest token (not a secret)"
regexes = [
  '''lf-tel-v1-7c4e9b2a1f8d3e6a0c5b9d4e8f1a2b3c''',
]