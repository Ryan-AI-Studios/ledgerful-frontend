version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 10
    versioning-strategy: auto
    labels:
      - dependencies
      - npm
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
    ignore:
      - dependency-name: next
        update-types:
          - version-update:semver-major
      - dependency-name: typescript
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    labels:
      - dependencies
      - github-actions
    groups:
      checkout:
        patterns:
          - "actions/checkout"
      artifact-actions:
        patterns:
          - "actions/upload-artifact"
          - "actions/download-artifact"
      other:
        patterns:
          - "*"
